<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LexiCheck | Linguistic Analysis Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 40px; }
        .wrapper { max-width: 1200px; margin: auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        
        .stat-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-item { flex: 1; padding: 15px; border-radius: 12px; background: #f1f5f9; text-align: center; }
        .stat-val { display: block; font-size: 1.8rem; font-weight: 700; color: #1e293b; }
        .stat-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }

        textarea { width: 100%; height: 250px; border: 1px solid #cbd5e1; border-radius: 12px; padding: 15px; font-size: 16px; font-family: inherit; resize: none; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3); }

        #output { height: 250px; border: 1px solid #cbd5e1; border-radius: 12px; padding: 15px; background: #fff; overflow-y: auto; line-height: 1.6; }
        
        /* Highlighting Styles */
        .err-strike { text-decoration: line-through; color: var(--danger); background: #fee2e2; padding: 0 2px; border-radius: 3px; margin-right: 4px; }
        .fix-green { color: var(--success); font-weight: 700; text-decoration: underline; margin-right: 6px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <h1>LexiCheck Analysis Engine</h1>
        <p>Identifying & Correcting text using Compiler-based Tokenization</p>
    </div>

    <div class="main-grid">
        <div class="card">
            <div class="stat-group">
                <div class="stat-item"><span id="acc" class="stat-val">0%</span><span class="stat-label">Accuracy</span></div>
                <div class="stat-item"><span id="err" class="stat-val">0</span><span class="stat-label">Issues Found</span></div>
            </div>
            <textarea id="textInput" placeholder="Paste text here..."></textarea>
            <input type="file" id="fileInput" style="margin-top:15px;">
            <button class="btn" onclick="analyze()">RUN ANALYSIS</button>
        </div>

        <div class="card">
            <h3>Corrected Output</h3>
            <div id="output">The analysis results will appear here.</div>
        </div>
    </div>
</div>

<script>
    async function analyze() {
        const text = document.getElementById('textInput').value;
        const file = document.getElementById('fileInput').files[0];
        const display = document.getElementById('output');
        
        display.innerHTML = "Processing tokens...";
        let body;
        let headers = {};

        if (file) {
            body = new FormData();
            body.append('file', file);
        } else {
            body = JSON.stringify({text: text});
            headers = {'Content-Type': 'application/json'};
        }

        const res = await fetch('/check', { method: 'POST', headers, body });
        const data = await res.json();

        document.getElementById('acc').innerText = data.accuracy + "%";
        document.getElementById('err').innerText = data.total_errors;
        display.innerHTML = data.corrected_text;
    }
</script>

</body>
</html>
