<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LexiCheck Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); padding: 40px; margin: 0; }
        .wrapper { max-width: 1100px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .stat-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-item { flex: 1; padding: 15px; border-radius: 12px; background: #f1f5f9; text-align: center; }
        .stat-val { display: block; font-size: 1.8rem; font-weight: 700; color: #1e293b; }
        textarea { width: 100%; height: 280px; border: 1px solid #cbd5e1; border-radius: 12px; padding: 15px; font-size: 16px; font-family: inherit; resize: none; box-sizing: border-box; outline: none; }
        .btn { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 15px; font-size: 16px; }
        #output { height: 280px; border: 1px solid #cbd5e1; border-radius: 12px; padding: 15px; background: #fff; overflow-y: auto; line-height: 1.6; white-space: pre-wrap; }
        .grammar-box { background: #fff7ed; border-left: 5px solid var(--warning); color: #92400e; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: 600; display: none; }
        .err-strike { text-decoration: line-through; color: var(--danger); background: #fee2e2; padding: 0 2px; border-radius: 3px; }
        .fix-green { color: var(--success); font-weight: 700; text-decoration: underline; margin-left: 4px; margin-right: 8px; }
    </style>
</head>
<body>
<div class="wrapper">
    <div style="text-align:center; margin-bottom:40px;">
        <h1>LexiCheck Analysis Engine</h1>
        <p>Phase-Based Linguistic Compilation</p>
    </div>
    <div class="grid">
        <div class="card">
            <div class="stat-group">
                <div class="stat-item"><span id="acc" class="stat-val">--</span>Accuracy</div>
                <div class="stat-item"><span id="err" class="stat-val">--</span>Issues</div>
            </div>
            <textarea id="textInput" placeholder="Type here..."></textarea>
            <input type="file" id="fileInput" style="margin-top:15px;">
            <button class="btn" onclick="analyze()">RUN COMPILER</button>
        </div>
        <div class="card">
            <div id="grammarBox" class="grammar-box"></div>
            <h3>Engine Output</h3>
            <div id="output">Waiting for input...</div>
        </div>
    </div>
</div>
<script>
    async function analyze() {
        const textArea = document.getElementById('textInput');
        const fileInput = document.getElementById('fileInput');
        const display = document.getElementById('output');
        const grammarBox = document.getElementById('grammarBox');
        
        let config = { method: 'POST' };

        // If a file is picked, send it. Otherwise send the text box content.
        if (fileInput.files.length > 0) {
            let formData = new FormData();
            formData.append('file', fileInput.files[0]);
            config.body = formData;
        } else {
            config.headers = {'Content-Type': 'application/json'};
            config.body = JSON.stringify({text: textArea.value});
        }

        const res = await fetch('/check', config);
        const data = await res.json();

        if (data.grammar_issue) {
            grammarBox.innerText = data.grammar_issue;
            grammarBox.style.display = 'block';
        } else {
            grammarBox.style.display = 'none';
        }

        document.getElementById('acc').innerText = data.accuracy + "%";
        document.getElementById('err').innerText = data.total_errors;
        display.innerHTML = data.corrected_text;
    }
</script>
</body>
</html>
